name: edit
description: >-
  A terminal-style text editor widget for Flutter. Extracted from Termisol,
  designed to feel like nano/vim inside a terminal. Features line numbers,
  dirty-indicator status bar, find/replace, and keyboard shortcuts.
version: 0.1.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'
  flutter: '>=3.29.0'

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^8.1.2
  path: ^1.9.0
